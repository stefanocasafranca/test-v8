<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life OS Tracker</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="container">
    <h1>Life OS Tracker</h1>

    <div class="layout">
      <div class="left-col">
        <!-- Tab bar -->
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="habits">Habits</button>
          <button class="tab-btn" data-tab="workout">Workout</button>
          <button class="tab-btn" data-tab="spending">Spending</button>
          <button class="tab-btn" data-tab="calendar">Calendar</button>
        </div>

        <!-- Habits tab -->
        <div class="tab-content active" id="tab-habits">
          <div class="date-nav">
            <button id="prev-day">&larr;</button>
            <span class="date-label" id="date-label"></span>
            <input type="date" id="date-picker" class="date-picker">
            <button id="next-day">&rarr;</button>
          </div>

          <div class="section-title">Daily Habits</div>
          <div class="habits" id="habits"></div>

          <div class="purchases">
            <div class="section-title">Purchases</div>
            <textarea id="purchases" placeholder="What did you buy today?"></textarea>
          </div>

          <div class="streak">
            <div class="streak-number" id="streak-count">0</div>
            <div class="streak-text">day streak (all habits)</div>
          </div>
        </div>

        <!-- Workout tab -->
        <div class="tab-content" id="tab-workout">
          <div id="workout-content"></div>
        </div>

        <!-- Spending tab -->
        <div class="tab-content" id="tab-spending">
          <div id="spending-content"></div>
        </div>

        <!-- Calendar tab -->
        <div class="tab-content" id="tab-calendar">
          <div id="calendar-content"></div>
        </div>
      </div>

      <div class="right-col">
        <div class="weekly-summary">
          <div class="section-title">Weekly Summary</div>
          <div class="weekly-week-label" id="weekly-range"></div>
          <div id="weekly-habits"></div>
          <div class="weekly-overall">
            <span class="weekly-overall-label">Overall completion</span>
            <span class="weekly-overall-pct" id="weekly-pct">0%</span>
          </div>
        </div>

        <div class="quick-stats">
          <div class="section-title">Quick Stats</div>
          <div id="quick-stats-content"></div>
        </div>

        <div class="today-events-widget">
          <div class="section-title">Today's Events</div>
          <div id="today-events-content">
            <span class="no-events-msg">No events loaded</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
  <script src="js/api.js"></script>
  <script src="js/habits.js"></script>
  <script src="js/workout.js"></script>
  <script src="js/spending.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
